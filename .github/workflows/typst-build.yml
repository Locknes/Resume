name: Compile Typst Resume

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.typ' # Only run the action if a Typst file is modified

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow the bot to commit the PDF back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Compile all Typst files
        run: |
          mkdir -p compiled
          for file in *.typ; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .typ)
              typst compile "$file" "compiled/${filename}.pdf"
            fi
          done

      - name: Upload PDFs as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-resumes
          path: compiled/

      - name: Commit PDF back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add compiled/
          
          # This prevents the workflow from failing if the PDFs haven't changed
          git diff --staged --quiet || git commit -m "chore: auto-compile resumes"
          git push