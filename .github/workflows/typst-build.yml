name: Compile Typst Resume

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.typ' # Only run the action if a Typst file is modified

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow the bot to commit the PDF back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Compile Resume
        # Replace 'resume.typ' and 'resume.pdf' with your actual filenames
        run: typst compile "Ian Caisse - Senior Systems Engineer - April 2026.typ" "Ian Caisse - Senior Systems Engineer - April 2026.pdf"


      - name: Upload PDF as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-resume
          path: "Ian Caisse - Senior Systems Engineer - April 2026.pdf"

      - name: Commit PDF back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "Ian Caisse - Senior Systems Engineer - April 2026.pdf"
          
          # This prevents the workflow from failing if the PDF hasn't changed
          git diff --staged --quiet || git commit -m "chore: auto-compile resume.pdf"
          git push